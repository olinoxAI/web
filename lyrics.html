      position: relative;
      overflow: hidden;
    }

    .page-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 18%);

    }

    .page {

    .page-line {
      width: 64px;

    .lyrics {
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: clamp(14px, 1.2vw, 20px);
      font-weight: 300;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--muted);
    }

      margin: 0;
    }

    .lyrics .spacer {
      height: 20px;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }

    .nav-row {
      width: min(560px, 100%);
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 24px;
    }

    .nav-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,0.64);
      font-size: 38px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease, opacity 0.18s ease;
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      color: rgba(255,255,255,0.92);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.24);
      transition: width 0.25s ease, background 0.25s ease, transform 0.25s ease;

      background: linear-gradient(90deg, var(--accent-2), var(--accent));

    let currentPage = 0;

    const pageEl = document.getElementById('page');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsEl = document.getElementById('dots');
    const counterEl = document.getElementById('counter');
    const pageNumberNav = document.getElementById("pageNumberNav");

    function formatNumber(n) {
      return String(n).padStart(2, '0');
    }

    function buildDots() {
      dotsEl.innerHTML = pages
        .map((_, i) => `<span class="dot ${i === currentPage ? 'active' : ''}" data-index="${i}"></span>`)
        .join('');

      dotsEl.querySelectorAll('.dot').forEach(dot => {
        dot.addEventListener('click', () => {
          currentPage = Number(dot.dataset.index);
          renderPage();
        });
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      const pageNumber = formatNumber(currentPage + 1);

      pageEl.innerHTML = `

        <h2 class="page-title">${page.title}</h2>
        <div class="page-line"></div>
        <div class="lyrics">
          ${page.lines.map(line => line === '' ? '<div class="spacer"></div>' : `<p>${line}</p>`).join('')}
        </div>
      `;

      counterEl.textContent = `${pageNumber} / ${formatNumber(pages.length)}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      buildDots();

      pageNumberNav.innerHTML = pages.map((_, i) => `
  <button class="page-number-link ${i === currentPage ? "active" : ""}" data-page="${i}">
    ${i + 1}
  </button>
`).join("");

document.querySelectorAll(".page-number-link").forEach(button => {
  button.addEventListener("click", () => {
    currentPage = Number(button.dataset.page);
    renderPage();
  });
});
    }

    prevBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage -= 1;
        renderPage();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentPage < pages.length - 1) {
        currentPage += 1;
        renderPage();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' && currentPage < pages.length - 1) {
        currentPage += 1;
        renderPage();
      }
      if (event.key === 'ArrowLeft' && currentPage > 0) {
        currentPage -= 1;
        renderPage();
      }
    });

    renderPage();
  </script>
