<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waves Booklet</title>
  <style>
    :root {
      --bg: #030305;
      --panel: #06070b;
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(201, 205, 218, 0.72);
      --soft: rgba(201, 205, 218, 0.34);
      --accent: #5f6fff;
      --accent-2: #8b5cf6;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 24%, rgba(68, 61, 255, 0.12), transparent 0 28%),
        radial-gradient(circle at 10% 50%, rgba(85, 0, 255, 0.08), transparent 0 18%),
        radial-gradient(circle at 90% 50%, rgba(50, 70, 255, 0.06), transparent 0 18%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 28px;
    }

    .app {
      width: min(1180px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 300;
      letter-spacing: 0.18em;
      line-height: 0.95;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      padding-left: 0.18em;
    }

    .hero-subtitle {
      margin: 0;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--soft);
      padding-left: 0.28em;
    }

    .page-shell {
      /* Adjust this value to control frame width (currently ~50% of previous) */
      max-width: 600px;
      width: 100%;
      min-height: 560px;
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.005));
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .page-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 18%);
      pointer-events: none;
    }

    .page {
      max-width: 620px;
      padding: 72px 72px 64px;
    }

    .page-index {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #8490ff;
      margin-bottom: 18px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 300;
      line-height: 1.05;
      color: rgba(255,255,255,0.96);
    }

    .page-line {
      width: 64px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      margin: 24px 0 40px;
      border-radius: 999px;
    }

    .lyrics {
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: clamp(16px, 1.6vw, 20px);
      font-weight: 300;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--muted);
    }

    .lyrics p {
      margin: 0;
    }

    .lyrics .spacer {
      height: 20px;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }

    .nav-row {
      width: min(560px, 100%);
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 24px;
    }

    .nav-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,0.64);
      font-size: 38px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease, opacity 0.18s ease;
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      color: rgba(255,255,255,0.92);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.24);
      transition: width 0.25s ease, background 0.25s ease, transform 0.25s ease;
    }

    .dot.active {
      width: 48px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .counter {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(182, 187, 206, 0.74);
    }

    @media (max-width: 900px) {
      body {
        padding: 24px 14px 24px;
      }

      .app {
        gap: 20px;
      }

      .hero-subtitle {
        font-size: 12px;
      }

      .page-shell {
        min-height: 620px;
      }

      .page {
        padding: 64px 32px 56px;
      }

      .page-index {
        font-size: 16px;
        margin-bottom: 18px;
      }

      .page-line {
        margin: 24px 0 42px;
      }

      .lyrics {
        font-size: 18px;
        gap: 16px;
      }

      .nav-row {
        gap: 14px;
      }

      .nav-btn {
        width: 48px;
        height: 48px;
        font-size: 32px;
      }

      .dot.active {
        width: 36px;
      }

      .counter {
        font-size: 16px;
      }
    }
  .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(3,3,5,0.6);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      color: rgba(255,255,255,0.85);
      font-size: 16px;
    }

    .logo {
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .nav-link {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 18px 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(3,3,5,0.6);
      backdrop-filter: blur(6px);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    .footer-right {
      display: flex;
      gap: 24px;
      color: rgba(255,255,255,0.85);
    }

    body {
      padding-top: 80px;
      padding-bottom: 80px;
    }

  </style>
</head>
<body>

      <div class="topbar-inner">
        <div class="logo">♪ OliNox</div>

    <main class="app">
    <header class="hero">
      <h1 class="hero-title">WAVES</h1>
      <p class="hero-subtitle">Echo Collective</p>
    </header>

    <section class="page-shell">
      <article class="page" id="page"></article>
    </section>

    <section class="controls">
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" aria-label="Previous page">&#8249;</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn" id="nextBtn" aria-label="Next page">&#8250;</button>
      </div>
      <div class="counter" id="counter">01 / 12</div>
    </section>
  </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">© 2026 OliNox</div>
        <div class="footer-right">
          <span>SPOTIFY</span>
          <span>APPLE MUSIC</span>

      },
      {
        title: 'Afterlight',
        lines: [
          'Occaecati cupiditate non provident,',
          'similique sunt in culpa qui,',
          'officia deserunt mollitia animi,',
          'id est laborum et dolorum.',
          '',
          'Fuga harum quidem rerum facilis,',
          'expedita distinctio nam libero,',
          'tempore cum soluta nobis est,',
          'eligendi optio cumque nihil.',
          '',
          'Impedit quo minus id quod,',
          'maxime placeat facere possimus.'
        ]
      },
      {
        title: 'Horizon',
        lines: [
          'Omnis voluptas assumenda est omnis,',
          'dolor repellendus temporibus autem,',
          'quibusdam aut officiis debitis,',
          'aut rerum necessitatibus saepe.',
          '',
          'Eveniet ut et voluptates repudiandae,',
          'sint et molestiae non recusandae,',
          'itaque earum rerum hic tenetur,',
          'a sapiente delectus ut aut.',
          '',
          'Reiciendis voluptatibus maiores alias,',
          'consequatur aut perferendis.'
        ]
      },
      {
        title: 'Waves',
        lines: [
          'Lorem ipsum dolor sit amet,',
          'consectetur adipiscing elit sed do,',
          'eiusmod tempor incididunt ut labore,',
          'et dolore magna aliqua enim.',
          '',
          'Ad minim veniam quis nostrud,',
          'exercitation ullamco laboris nisi,',
          'ut aliquip ex ea commodo,',
          'consequat duis aute irure dolor.',
          '',
          'In reprehenderit in voluptate velit,',
          'esse cillum dolore eu fugiat.'
        ]
      }
    ];

    let currentPage = 0;

    const pageEl = document.getElementById('page');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsEl = document.getElementById('dots');
    const counterEl = document.getElementById('counter');

    function formatNumber(n) {
      return String(n).padStart(2, '0');
    }

    function buildDots() {
      dotsEl.innerHTML = pages
        .map((_, i) => `<span class="dot ${i === currentPage ? 'active' : ''}" data-index="${i}"></span>`)
        .join('');

      dotsEl.querySelectorAll('.dot').forEach(dot => {
        dot.addEventListener('click', () => {
          currentPage = Number(dot.dataset.index);
          renderPage();
        });
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      const pageNumber = formatNumber(currentPage + 1);

      pageEl.innerHTML = `
        <div class="page-index">${pageNumber}</div>
        <h2 class="page-title">${page.title}</h2>
        <div class="page-line"></div>
        <div class="lyrics">
          ${page.lines.map(line => line === '' ? '<div class="spacer"></div>' : `<p>${line}</p>`).join('')}
        </div>
      `;

      counterEl.textContent = `${pageNumber} / ${formatNumber(pages.length)}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      buildDots();
    }

    prevBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage -= 1;
        renderPage();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentPage < pages.length - 1) {
        currentPage += 1;
        renderPage();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' && currentPage < pages.length - 1) {
        currentPage += 1;
        renderPage();
      }
      if (event.key === 'ArrowLeft' && currentPage > 0) {
        currentPage -= 1;
        renderPage();
      }
    });

    renderPage();
